version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

brews:
  - name: pm
    repository:
      owner: rusintez
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/rusintez/pm
    description: Superlight process manager
    install: bin.install "pm"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
